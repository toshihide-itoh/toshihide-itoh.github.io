<!-- {% case site.tag_archive.type %}
    {% when "liquid" %}
        {% assign path_type = "#" %}
    {% when "jekyll-archives" %}
        {% assign path_type = nil %}
{% endcase %}

{% if site.tag_archive.path %}
    {% assign tags_sorted = page.tags | sort_natural %}
{% endif %} -->

<p class="post-tag">
    <span>{{ site.data.ui-text[site.locale].tags_label | default: "Tags:" }}</span>
    <span itemprop="keywords">
        {% for tag_word in tags_sorted %}
            <a href="{{ tag_word | slugify | prepend: path_type | prepend: site.tag_archive.path | relative_url }}"class="post-tag-item p-category" rel="tag">
                {{ tag_word | downcase }}
            </a>
            <!-- {% unless forloop.last %} -->
            <!-- <span class="sep">, </span> -->
            <!-- {% endunless %} -->
        {% endfor %}
    </span>
</p>
